# compose/ddclient/docker-compose.yml

#version: "3.8"

services:
  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    restart: unless-stopped
    environment:
      # Set user and group IDs to match your host user for volume permissions
      PUID: ${DDCLIENT_PUID:-1000}
      PGID: ${DDCLIENT_PGID:-1000}
      # Set your timezone
      TZ: ${DDCLIENT_TZ:-Etc/UTC}
    volumes:
      # Map host config directory to container's /config
      # This is where ddclient.conf will be placed
      - ../../data/ddclient/config:/config
    networks:
      - ddclient_internal # Isolate ddclient network-wise

networks:
  ddclient_internal:
    driver: bridge
    name: ddclient_internal_network
